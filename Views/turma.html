<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Turma - AVA</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: block;
            min-height: 100vh;
        }

        .header-top {
            background: #2d1b4e;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .header-top h1 {
            margin: 0;
            color: white;
            font-size: 1.5em;
            text-align: left;
        }

        .btn-voltar {
            background-color: #667eea;
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.3s;
            margin: 0;
            width: auto;
        }

        .btn-voltar:hover {
            background-color: #556fd1;
        }

        .content-area {
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .content-area {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .card.full {
            grid-column: 1 / -1;
        }

        .card h2 {
            color: #333;
            margin: 0 0 15px 0;
            font-size: 1.3em;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .participant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .participant-item:last-child {
            border-bottom: none;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .email {
            font-size: 1em;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .role {
            font-size: 0.85em;
            color: #666;
            margin-top: 2px;
        }

        .loading,
        .error-msg {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }

        .error-msg {
            color: #e74c3c;
        }

        .aula-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .aula-item:last-child {
            border-bottom: none;
        }

        .aula-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .aula-assunto {
            font-weight: bold;
            color: #333;
            font-size: 1em;
        }

        .aula-status {
            font-size: 0.85em;
        }

        .aula-status.ativa {
            color: #27ae60;
        }

        .aula-status.encerrada {
            color: #e74c3c;
        }

        .aula-data {
            font-size: 0.8em;
            color: #999;
        }

        .btn-entrar {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: auto;
            transition: background 0.3s;
        }

        .btn-entrar:hover {
            background: #219a52;
        }

        .btn-entrar.encerrada {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .form-aula {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-aula input,
        .form-aula select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .form-aula button {
            width: auto;
            align-self: flex-start;
        }

        .sem-aulas {
            color: #666;
            padding: 15px 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="header-top">
        <h1 id="turma-titulo">Carregando Turma...</h1>
        <a href="/dashboard" class="btn-voltar">Voltar</a>
    </div>

    <div class="content-area" id="conteudo-turma" style="display: none;">
        <div class="card">
            <h2>Alunos Matriculados</h2>
            <ul class="participant-list" id="lista-alunos">
                <!-- Alunos serão preenchidos aqui -->
            </ul>
        </div>

        <div class="card">
            <h2>Professor Responsável</h2>
            <ul class="participant-list" id="lista-professor">
                <!-- Professor será preenchido aqui -->
            </ul>
        </div>

        <div class="card full" id="card-aulas" style="display: none;">
            <h2>Aulas</h2>
            <div id="aula-list">
                <div class="sem-aulas">Nenhuma aula cadastrada.</div>
            </div>
        </div>

        <div class="card full" id="card-iniciar-aula" style="display: none;">
            <h2>Iniciar Nova Aula</h2>
            <form class="form-aula" id="form-iniciar-aula">
                <input type="text" id="input-assunto" placeholder="Assunto da aula (ex: Introdução à POO)" required>
                <input type="number" id="input-duracao" placeholder="Duração em minutos (ex: 60)" value="60" min="1" required>
                <button type="submit">Iniciar Aula</button>
            </form>
        </div>
    </div>

    <div id="mensagem-estado" class="loading">
        <span id="mensagem-texto">Buscando informações da turma...</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const turmaId = params.get('id');

            if (!turmaId) {
                mostrarErro('ID da turma não fornecido na URL.');
                return;
            }

            fetchTurmaDetalhes(turmaId);
        });

        function fetchTurmaDetalhes(id) {
            fetch('http://localhost:5000/api/listar_turmas')
                .then(response => {
                    if (!response.ok) throw new Error('Falha ao buscar turmas');
                    return response.json();
                })
                .then(turmas => {
                    const turma = turmas.find(t => t.id == id);
                    if (!turma) {
                        mostrarErro('Turma não encontrada. Verifique se o ID está correto.');
                        return;
                    }
                    renderizarTurma(turma);
                })
                .catch(error => {
                    console.error('Erro:', error);
                    mostrarErro('Erro ao carregar os dados da turma. Tente novamente mais tarde.');
                });
        }

        function mostrarErro(mensagem) {
            document.getElementById('mensagem-texto').innerHTML = `<span class="error-msg">${mensagem}</span>`;
            document.getElementById('mensagem-estado').style.display = 'block';
            document.getElementById('conteudo-turma').style.display = 'none';
        }

        function getIniciais(email) {
            if (!email) return '?';
            const nome = email.split('@')[0];
            return nome.substring(0, 2).toUpperCase();
        }

        function renderizarTurma(turma) {
            document.getElementById('mensagem-estado').style.display = 'none';
            document.getElementById('conteudo-turma').style.display = 'grid';

            document.getElementById('turma-titulo').textContent = turma.nome_turma || `Turma #${turma.id}`;

            const usuario = JSON.parse(localStorage.getItem('usuario'));

            // Renderizar Professor
            const listaProf = document.getElementById('lista-professor');
            listaProf.innerHTML = '';
            const emailProf = turma.professor_email || 'Não atribuído';
            listaProf.innerHTML = `
                <li class="participant-item">
                    <div class="avatar" style="background: #764ba2;">
                        ${emailProf !== 'Não atribuído' ? getIniciais(emailProf) : '?'}
                    </div>
                    <div class="info">
                        <span class="email" title="${emailProf}">${emailProf}</span>
                        <span class="role">Professor</span>
                    </div>
                </li>
            `;

            // Renderizar Alunos
            const listaAlunos = document.getElementById('lista-alunos');
            listaAlunos.innerHTML = '';

            if (!turma.alunos || turma.alunos.length === 0) {
                listaAlunos.innerHTML = '<li style="color: #666; padding: 15px 0;">Nenhum aluno matriculado nesta turma ainda.</li>';
            } else {
                turma.alunos.forEach(alunoEmail => {
                    const li = document.createElement('li');
                    li.className = 'participant-item';
                    li.innerHTML = `
                        <div class="avatar">
                            ${getIniciais(alunoEmail)}
                        </div>
                        <div class="info">
                            <span class="email" title="${alunoEmail}">${alunoEmail}</span>
                            <span class="role">Aluno</span>
                        </div>
                    `;
                    listaAlunos.appendChild(li);
                });
            }

            // Renderizar Aulas
            renderizarAulas(turma);

            // Se for professor desta turma, mostra form para iniciar aula
            if (usuario && usuario.tipo === 'professor' && usuario.email === turma.professor_email) {
                document.getElementById('card-iniciar-aula').style.display = 'block';
                document.getElementById('form-iniciar-aula').addEventListener('submit', function (e) {
                    e.preventDefault();
                    iniciarAula(turma.id);
                });
            }
        }

        function renderizarAulas(turma) {
            const aulas = turma.aulas || [];
            const container = document.getElementById('aula-list');
            const card = document.getElementById('card-aulas');

            if (aulas.length === 0) {
                card.style.display = 'none';
                return;
            }

            card.style.display = 'block';
            container.innerHTML = '';
            const usuario = JSON.parse(localStorage.getItem('usuario'));

            aulas.forEach(aula => {
                const div = document.createElement('div');
                div.className = 'aula-item';

                const statusClass = aula.status === 'ativa' ? 'ativa' : 'encerrada';
                const statusLabel = aula.status === 'ativa' ? 'Ativa' : 'Encerrada';
                const dataInicio = aula.data_inicio ? new Date(aula.data_inicio).toLocaleString('pt-BR') : '-';

                div.innerHTML = `
                    <div class="aula-info">
                        <span class="aula-assunto">${aula.assunto || 'Sem assunto'}</span>
                        <span class="aula-status ${statusClass}">${statusLabel}</span>
                        <span class="aula-data">${dataInicio}</span>
                    </div>
                    <button class="btn-entrar ${aula.status !== 'ativa' ? 'encerrada' : ''}"
                        ${aula.status !== 'ativa' ? 'disabled' : ''}
                        onclick="entrarAula(${turma.id}, ${aula.id})">
                        ${aula.status === 'ativa' ? 'Entrar' : 'Finalizada'}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function iniciarAula(idTurma) {
            const assunto = document.getElementById('input-assunto').value.trim();
            const duracao = parseInt(document.getElementById('input-duracao').value) * 60;

            if (!assunto) {
                alert('Digite o assunto da aula.');
                return;
            }

            fetch('http://localhost:5000/api/iniciar_aula', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id_turma: idTurma,
                    assunto: assunto,
                    duracao: duracao
                })
            })
                .then(r => r.json())
                .then(data => {
                    alert(data.message || data.error);
                    if (data.aula) {
                        window.location.href = '/aula.html?id_turma=' + idTurma + '&id_aula=' + data.aula.id;
                    }
                })
                .catch(err => {
                    alert('Erro ao iniciar aula: ' + err.message);
                });
        }

        function entrarAula(idTurma, idAula) {
            window.location.href = '/aula.html?id_turma=' + idTurma + '&id_aula=' + idAula;
        }
    </script>
</body>

</html>
